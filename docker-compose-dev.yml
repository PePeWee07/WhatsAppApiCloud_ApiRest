services:
  whatsapp_app:
    container_name: catia-core
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8082:8082"
    env_file:
      - .env
    depends_on:
      whatsapp_db:
        condition: service_healthy
      whatsapp_redis:
        condition: service_started
    volumes:
      - .:/app
      - ./welcome_message.txt:/app/doc/welcome_message.txt
    networks:
      - virtual_assistant_network
    environment:
      SPRING_REDIS_HOST: whatsapp_redis
      SPRING_REDIS_PORT: 6379
      SPRING_PROFILES_ACTIVE: docker

  whatsapp_db:
    container_name: catia-db
    image: postgres:13.3
    ports:
      - "5433:5432"
    networks:
      - virtual_assistant_network
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - whatsapp_postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      retries: 5
      start_period: 30s

  whatsapp_redis:
    container_name: catia-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - whatsapp_redis_data:/data
    networks:
      - virtual_assistant_network
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  whatsapp_postgres_data:
  whatsapp_redis_data:

networks:
  virtual_assistant_network:
    external: true
